name: meena_cards
description: Meena Cards native Android app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  transparent_image: ^2.0.1
  go_router: ^13.2.0
  share_plus: ^13.0.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
